<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Unsocial Network</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Newsreader:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      background: #0A0C10;
      color: #E5E7EB;
      font-family: 'DM Sans', sans-serif;
    }

    #app {
      width: 100%;
      max-width: 480px;
      height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: #0A0C10;
      overflow: hidden;
      position: relative;
    }

    header {
      padding: 16px 16px;
      background: rgba(10, 12, 16, 0.7);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(91, 156, 246, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
    }

    .header-title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .header-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: rgba(91, 156, 246, 0.1);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s ease;
      color: #5B9CF6;
    }

    .header-btn:active {
      background: rgba(91, 156, 246, 0.2);
      transform: scale(0.95);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      -webkit-overflow-scrolling: touch;
    }

    .view {
      display: none;
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .view.active {
      display: flex;
      flex-direction: column;
    }

    #homeView {
      flex-direction: column;
    }

    .sort-controls {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid rgba(91, 156, 246, 0.1);
      flex-shrink: 0;
    }

    .sort-btn {
      padding: 6px 12px;
      background: rgba(91, 156, 246, 0.1);
      border: 1px solid rgba(91, 156, 246, 0.2);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: #E5E7EB;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .sort-btn.active {
      background: #5B9CF6;
      border-color: #5B9CF6;
      color: #0A0C10;
    }

    .sort-btn:active {
      transform: scale(0.95);
    }

    .cards-container {
      flex: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .card {
      background: #14161E;
      border-radius: 12px;
      padding: 12px;
      border: 1px solid rgba(91, 156, 246, 0.1);
      animation: cardEnter 0.4s ease-out;
    }

    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
      font-size: 11px;
      color: #9CA3AF;
    }

    .card-meta {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .card-type {
      background: rgba(91, 156, 246, 0.15);
      padding: 2px 8px;
      border-radius: 4px;
      color: #5B9CF6;
      font-weight: 500;
    }

    .card-platform {
      color: #D1D5DB;
    }

    .card-date {
      color: #6B7280;
    }

    .card-title {
      font-family: 'Newsreader', serif;
      font-size: 18px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 8px;
      color: #F3F4F6;
    }

    .card-author {
      font-size: 13px;
      color: #9CA3AF;
      margin-bottom: 8px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      background: rgba(91, 156, 246, 0.15);
      color: #5B9CF6;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tag:active {
      transform: scale(0.95);
    }

    .card-summary {
      font-size: 13px;
      line-height: 1.5;
      color: #D1D5DB;
      margin-bottom: 12px;
    }

    .card-actions {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-top: 10px;
      border-top: 1px solid rgba(91, 156, 246, 0.08);
    }

    .action-btn {
      width: 44px;
      height: 44px;
      padding: 0;
      background: none;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
    }

    .action-btn:active {
      background: rgba(91, 156, 246, 0.15);
      transform: scale(0.9);
    }

    .action-btn img {
      width: 30px;
      height: 30px;
      object-fit: contain;
    }

    .action-btn svg {
      width: 22px;
      height: 22px;
      stroke: #9CA3AF;
      fill: none;
      stroke-width: 1.8;
    }

    .action-btn:active svg {
      stroke: #5B9CF6;
    }

    .action-btn.liked svg {
      stroke: #F47067;
      fill: #F47067;
    }

    #feedView {
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .feed-stack {
      position: relative;
      width: 100%;
      max-width: 380px;
      height: 600px;
      perspective: 1000px;
    }

    .feed-card {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #14161E;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(91, 156, 246, 0.1);
      touch-action: pan-y;
      cursor: grab;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .feed-card.active {
      z-index: 3;
      transform: translateY(0) scale(1) rotateZ(0deg);
    }

    .feed-card.next {
      z-index: 2;
      transform: translateY(20px) scale(0.95) rotateZ(-2deg);
      opacity: 0.6;
    }

    .feed-card.next-next {
      z-index: 1;
      transform: translateY(40px) scale(0.9) rotateZ(-4deg);
      opacity: 0.4;
    }

    .feed-card-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 12px;
      color: #9CA3AF;
    }

    .feed-card-type {
      background: rgba(91, 156, 246, 0.15);
      padding: 4px 10px;
      border-radius: 4px;
      color: #5B9CF6;
      font-weight: 500;
    }

    .feed-card-date {
      color: #6B7280;
    }

    .feed-card-title {
      font-family: 'Newsreader', serif;
      font-size: 28px;
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 16px;
      color: #F3F4F6;
    }

    .feed-card-author {
      font-size: 14px;
      color: #9CA3AF;
      margin-bottom: 12px;
    }

    .feed-card-posted {
      font-size: 12px;
      color: #6B7280;
      margin-bottom: 16px;
    }

    .feed-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .feed-card-summary {
      font-size: 14px;
      line-height: 1.6;
      color: #D1D5DB;
      flex: 1;
      margin-bottom: 16px;
    }

    .feed-card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .feed-action-btn {
      flex: 1;
      min-width: 60px;
      padding: 10px 12px;
      background: rgba(91, 156, 246, 0.1);
      border: 1px solid rgba(91, 156, 246, 0.2);
      border-radius: 6px;
      color: #5B9CF6;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .feed-action-btn:active {
      background: rgba(91, 156, 246, 0.2);
    }

    .feed-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      border-radius: 16px;
    }

    .feed-overlay.left {
      background: rgba(244, 63, 94, 0.2);
      color: #F83E5E;
    }

    .feed-overlay.right {
      background: rgba(91, 156, 246, 0.2);
      color: #5B9CF6;
    }

    .feed-overlay.show {
      opacity: 1;
    }

    #savedView {
      flex-direction: column;
    }

    .saved-container {
      flex: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: #6B7280;
      text-align: center;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    nav {
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      background: rgba(10, 12, 16, 0.7);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(91, 156, 246, 0.1);
      flex-shrink: 0;
      z-index: 100;
    }

    .nav-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: none;
      color: #6B7280;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .nav-btn.active {
      color: #5B9CF6;
    }

    .nav-icon {
      font-size: 20px;
    }

    .nav-icon-img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      opacity: 0.7;
      transition: opacity 0.2s ease;
    }

    .nav-btn:disabled .nav-icon-img {
      opacity: 0.2;
    }

    .nav-btn:not(:disabled):active .nav-icon-img {
      opacity: 1;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 200;
      animation: fadeIn 0.2s ease;
    }

    .modal.open {
      display: flex;
      align-items: flex-end;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: #14161E;
      width: 100%;
      max-width: 480px;
      border-radius: 16px 16px 0 0;
      padding: 20px;
      animation: slideUp 0.3s ease;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #F3F4F6;
    }

    .modal-section {
      margin-bottom: 16px;
    }

    .modal-label {
      font-size: 12px;
      color: #9CA3AF;
      font-weight: 600;
      margin-bottom: 8px;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tag-input {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .tag-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(91, 156, 246, 0.15);
      border: 1px solid rgba(91, 156, 246, 0.2);
      border-radius: 12px;
      font-size: 12px;
      color: #5B9CF6;
    }

    .tag-chip-remove {
      cursor: pointer;
      font-weight: 700;
      opacity: 0.6;
      transition: opacity 0.2s ease;
    }

    .tag-chip-remove:active {
      opacity: 1;
    }

    .tag-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag-suggestion {
      padding: 6px 12px;
      background: rgba(91, 156, 246, 0.1);
      border: 1px solid rgba(91, 156, 246, 0.15);
      border-radius: 6px;
      font-size: 12px;
      color: #9CA3AF;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tag-suggestion:active {
      background: rgba(91, 156, 246, 0.2);
      color: #5B9CF6;
    }

    .modal-buttons {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
    }

    .modal-btn.primary {
      background: #5B9CF6;
      color: #0A0C10;
    }

    .modal-btn.primary:active {
      background: #4A8FE8;
    }

    .modal-btn.secondary {
      background: rgba(91, 156, 246, 0.1);
      color: #5B9CF6;
      border: 1px solid rgba(91, 156, 246, 0.2);
    }

    .modal-btn.secondary:active {
      background: rgba(91, 156, 246, 0.15);
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border: none;
      background: rgba(91, 156, 246, 0.1);
      border-radius: 8px;
      color: #5B9CF6;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .modal-close:active {
      background: rgba(91, 156, 246, 0.2);
    }

    .options-menu {
      position: fixed;
      background: #14161E;
      border: 1px solid rgba(91, 156, 246, 0.2);
      border-radius: 8px;
      min-width: 180px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      z-index: 300;
      animation: fadeIn 0.2s ease;
    }

    .menu-item {
      padding: 12px 16px;
      border: none;
      background: none;
      color: #E5E7EB;
      width: 100%;
      text-align: left;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
      border-bottom: 1px solid rgba(91, 156, 246, 0.05);
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    .menu-item:active {
      background: rgba(91, 156, 246, 0.1);
      color: #5B9CF6;
    }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #1F2937;
      color: #F3F4F6;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid rgba(91, 156, 246, 0.2);
      font-size: 14px;
      z-index: 250;
      animation: slideUp 0.3s ease;
      max-width: 90%;
      text-align: center;
    }

    input[type="text"],
    textarea {
      background: rgba(91, 156, 246, 0.05);
      border: 1px solid rgba(91, 156, 246, 0.2);
      border-radius: 8px;
      padding: 10px 12px;
      color: #E5E7EB;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      width: 100%;
      transition: all 0.2s ease;
    }

    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      background: rgba(91, 156, 246, 0.1);
      border-color: rgba(91, 156, 246, 0.4);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .undo-redo-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 6px 16px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(91, 156, 246, 0.06);
      position: sticky;
      top: 0;
      z-index: 10;
      background: #0F1724;
    }

    .undo-redo-btn {
      padding: 6px 14px;
      background: rgba(91, 156, 246, 0.08);
      border: 1px solid rgba(91, 156, 246, 0.15);
      border-radius: 6px;
      color: #5B9CF6;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .undo-redo-btn:disabled {
      opacity: 0.25;
      cursor: default;
    }

    .undo-redo-btn:not(:disabled):active {
      background: rgba(91, 156, 246, 0.2);
      transform: scale(0.95);
    }

    .tag-filter-btn {
      padding: 6px 14px;
      background: rgba(91, 156, 246, 0.08);
      border: 1px solid rgba(91, 156, 246, 0.15);
      border-radius: 6px;
      color: #9CA3AF;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-left: auto;
    }

    .tag-filter-btn.active-filter {
      background: rgba(91, 156, 246, 0.2);
      border-color: #5B9CF6;
      color: #5B9CF6;
    }

    .tag-filter-btn:active {
      transform: scale(0.95);
    }

    .tag-filter-modal-content {
      max-height: 70vh;
      overflow-y: auto;
    }

    .tag-filter-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag-filter-chip {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid rgba(91, 156, 246, 0.15);
      background: rgba(91, 156, 246, 0.05);
      color: #9CA3AF;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tag-filter-chip.selected {
      background: rgba(91, 156, 246, 0.2);
      border-color: #5B9CF6;
      color: #5B9CF6;
    }

    .tag-filter-chip:active {
      transform: scale(0.95);
    }

    .active-filters {
      display: none;
      gap: 6px;
      flex-wrap: wrap;
      padding: 4px 16px 8px;
      position: sticky;
      top: 37px;
      z-index: 10;
      background: #0F1724;
    }

    .active-filter-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: rgba(91, 156, 246, 0.15);
      border-radius: 12px;
      color: #5B9CF6;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(91, 156, 246, 0.2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(91, 156, 246, 0.3);
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="header-left">
        <img src="icon.png" alt="" class="header-logo">
        <div class="header-title">The Unsocial Network</div>
      </div>
      <div class="header-actions">
        <button class="header-btn" id="searchBtn" title="Search">🔍</button>
        <button class="header-btn" id="addBtn" title="Add Content">➕</button>
      </div>
    </header>

    <div class="content">
      <div class="active-filters" id="activeFilters"></div>
      <div id="homeView" class="view active">
        <div class="sort-controls">
          <button class="sort-btn active" id="cycleSortBtn" onclick="cycleSort()">Newest</button>
          <button class="sort-btn" id="typeFilterBtn" onclick="openTypeFilterModal()">Type</button>
          <button class="sort-btn" id="categoryFilterBtn" onclick="openCategoryFilterModal()">Category</button>
          <button class="sort-btn" id="tagFilterSortBtn" onclick="openTagFilterModal()">Tags</button>
          <button class="sort-btn" onclick="location.reload()" title="Refresh">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>
          </button>
        </div>
        <div class="cards-container" id="cardsContainer"></div>
      </div>

      <div id="feedView" class="view">
        <div class="feed-stack" id="feedStack"></div>
      </div>

      <div id="savedView" class="view">
        <div class="saved-container" id="savedContainer"></div>
      </div>
    </div>

    <nav>
      <button class="nav-btn active" data-view="home">
        <div class="nav-icon">📚</div>
        <div>The Feed</div>

    function parseDate(dateStr) {
      if (!dateStr) return new Date(0);
      const months = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 };
      const parts = dateStr.split(' ');
      if (parts.length === 3) {
        const month = months[parts[0]];
        const day = parseInt(parts[1]);
        const year = parseInt(parts[2]);
        return new Date(year, month, day);
      }
      return new Date(0);
    }

    function getSortedIndices(sort = 'newest') {
      const visible = articles.map((a, i) => i).filter(i => isVisible(i));
      const sorted = [...visible];
      if (sort === 'newest') {
        sorted.sort((a, b) => parseDate(articles[b].datePosted) - parseDate(articles[a].datePosted));
      } else if (sort === 'oldest') {
        sorted.sort((a, b) => parseDate(articles[a].datePosted) - parseDate(articles[b].datePosted));
      } else if (sort === 'saved') {
        sorted.sort((a, b) => parseDate(articles[b].dateSent) - parseDate(articles[a].dateSent));
      } else if (sort === 'category') {
        sorted.sort((a, b) => (articles[a].category || '').localeCompare(articles[b].category || ''));
      } else if (sort === 'shuffle') {
        for (let i = sorted.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [sorted[i], sorted[j]] = [sorted[j], sorted[i]];
        }
      }
      return sorted;
    }

    function isVisible(index) {
      const article = articles[index];
      if (article.archived) return false;
      if (searchQuery && !article.title.toLowerCase().includes(searchQuery.toLowerCase()) && !article.summary.toLowerCase().includes(searchQuery.toLowerCase())) return false;
      if (activeTypeFilters.size > 0 && !activeTypeFilters.has(article.contentType)) return false;
      if (activeCategoryFilters.size > 0 && !activeCategoryFilters.has(article.category)) return false;
      if (activeTagFilters.size > 0 && !article.tags.some(t => activeTagFilters.has(t))) return false;
      return true;
    }

    }

    function applyTagFilters() {
      document.getElementById('tagFilterModal').classList.remove('open');
      renderActiveFilters();
      updateFilterBtnStates();
      render();
    }

    function renderActiveFilters() {
      const container = document.getElementById('activeFilters');
      if (!container) return;
      const hasAny = activeTypeFilters.size > 0 || activeCategoryFilters.size > 0 || activeTagFilters.size > 0;
      if (!hasAny) {
        container.innerHTML = '';
        container.style.display = 'none';
        return;
      }
      container.style.display = 'flex';
      let html = '';
      activeTypeFilters.forEach(t => {
        html += `<span class="active-filter-pill" onclick="removeActiveType('${t}')">${t} ×</span>`;
      });
      activeCategoryFilters.forEach(c => {
        html += `<span class="active-filter-pill" onclick="removeActiveCategory('${c.replace(/'/g, "\\'")}')">${c} ×</span>`;
      });
      activeTagFilters.forEach(t => {
        html += `<span class="active-filter-pill" onclick="removeActiveTag('${t.replace(/'/g, "\\'")}')">${t} ×</span>`;
      });
      html += `<span class="active-filter-pill" onclick="clearAllFilters()" style="cursor:pointer;background:#374151;">Clear all ×</span>`;
      container.innerHTML = html;
    }

    function removeActiveType(type) {
      activeTypeFilters.delete(type);
      renderActiveFilters();
      updateFilterBtnStates();
      render();
    }

    function removeActiveCategory(cat) {
      activeCategoryFilters.delete(cat);
      renderActiveFilters();
      updateFilterBtnStates();
      render();
    }

    function removeActiveTag(tag) {
      activeTagFilters.delete(tag);
      renderActiveFilters();
      updateFilterBtnStates();
      render();
    }

    function clearAllFilters() {
      activeTypeFilters.clear();
      activeCategoryFilters.clear();
      activeTagFilters.clear();
      renderActiveFilters();
      updateFilterBtnStates();
      render();
    }

    function renderHome() {
      const container = document.getElementById('cardsContainer');
      container.innerHTML = '';
      const indices = getSortedIndices(currentSort);
      indices.forEach((idx) => {
        const article = articles[idx];
        const catColor = CAT_COLORS[article.category] || '#5B9CF6';
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<div class="card-header"><div class="card-meta"><div class="card-type">${article.contentType}</div><div class="card-platform">${article.platform}</div></div><div class="card-date">${article.dateSent}</div></div><div class="card-title">${article.title}</div><div class="card-author">by ${article.author}</div><div class="card-tags">${article.tags.map(tag => `<span class="tag" style="background-color: ${catColor}22; color: ${catColor};">${tag}</span>`).join('')}</div><div class="card-summary">${article.summary}</div><div class="card-actions"><button class="action-btn" onclick="openArticle(${idx})"><img src="Icons/ShuffleIn.png" alt="Open" title="Open"></button><button class="action-btn" onclick="archiveArticle(${idx})"><img src="Icons/Archive.png" alt="Archive" title="Archive"></button><button class="action-btn" onclick="toggleLike(${idx})"><img src="Icons/Like.png" alt="${article.liked ? 'Unlike' : 'Like'}" title="${article.liked ? 'Unlike' : 'Like'}" style="${article.liked ? 'filter: drop-shadow(0 0 4px #F472B6); opacity:1;' : ''}"></button><button class="action-btn" onclick="showOptionsMenu(event, ${idx})"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5" fill="#9CA3AF" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="#9CA3AF" stroke="none"/><circle cx="12" cy="19" r="1.5" fill="#9CA3AF" stroke="none"/></svg></button></div>`;
        container.appendChild(card);
      });
    }

    function renderFeed() {
      const feedStack = document.getElementById('feedStack');
      feedStack.innerHTML = '';
      feedIndices = getSortedIndices('shuffle');
      feedCurrentIndex = 0;
      renderFeedCards();
    }

    function renderFeedCards() {
      const feedStack = document.getElementById('feedStack');
      feedStack.innerHTML = '';
      for (let i = 0; i < 3 && feedCurrentIndex + i < feedIndices.length; i++) {
        const idx = feedIndices[feedCurrentIndex + i];
        const article = articles[idx];
        const catColor = CAT_COLORS[article.category] || '#5B9CF6';
        const card = document.createElement('div');
        card.className = 'feed-card';
        if (i === 0) card.classList.add('active');
        else if (i === 1) card.classList.add('next');
        else if (i === 2) card.classList.add('next-next');
        card.innerHTML = `<div class="feed-card-header"><div class="feed-card-type">${article.contentType}</div><div class="feed-card-date">${article.dateSent}</div></div><div class="feed-card-title">${article.title}</div><div class="feed-card-author">by ${article.author}</div><div class="feed-card-posted">${article.datePosted}</div><div class="feed-card-tags">${article.tags.map(tag => `<span class="tag" style="background-color: ${catColor}22; color: ${catColor};">${tag}</span>`).join('')}</div><div class="feed-card-summary">${article.summary}</div><div class="feed-card-actions"><button class="action-btn" onclick="openArticle(${idx})"><img src="Icons/ShuffleIn.png" alt="Open" title="Open"></button><button class="action-btn" onclick="archiveArticle(${idx})"><img src="Icons/Archive.png" alt="Archive" title="Archive"></button><button class="action-btn" onclick="toggleLike(${idx})"><img src="Icons/Like.png" alt="${article.liked ? 'Unlike' : 'Like'}" title="${article.liked ? 'Unlike' : 'Like'}" style="${article.liked ? 'filter: drop-shadow(0 0 4px #F472B6); opacity:1;' : ''}"></button></div>`;
        card.addEventListener('pointerdown', feedCardPointerDown);
        card.addEventListener('pointermove', feedCardPointerMove);
        card.addEventListener('pointerup', feedCardPointerUp);
        feedStack.appendChild(card);
      }
    }

    function renderSaved() {
      const container = document.getElementById('savedContainer');
      container.innerHTML = '';
      const saved = articles.filter((a) => !a.archived && a.liked);
      if (saved.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⭐</div><p>No saved items yet</p></div>';
        return;
      }
      saved.forEach((article) => {
        const idx = articles.indexOf(article);
        const catColor = CAT_COLORS[article.category] || '#5B9CF6';
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<div class="card-header"><div class="card-meta"><div class="card-type">${article.contentType}</div><div class="card-platform">${article.platform}</div></div><div class="card-date">${article.dateSent}</div></div><div class="card-title">${article.title}</div><div class="card-author">by ${article.author}</div><div class="card-tags">${article.tags.map(tag => `<span class="tag" style="background-color: ${catColor}22; color: ${catColor};">${tag}</span>`).join('')}</div><div class="card-summary">${article.summary}</div><div class="card-actions"><button class="action-btn" onclick="openArticle(${idx})"><img src="Icons/ShuffleIn.png" alt="Open" title="Open"></button><button class="action-btn" onclick="archiveArticle(${idx})"><img src="Icons/Archive.png" alt="Archive" title="Archive"></button><button class="action-btn" onclick="toggleLike(${idx})"><img src="Icons/Like.png" alt="Remove" title="Remove" style="filter: drop-shadow(0 0 4px #F472B6); opacity:1;"></button><button class="action-btn" onclick="showOptionsMenu(event, ${idx})"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5" fill="#9CA3AF" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="#9CA3AF" stroke="none"/><circle cx="12" cy="19" r="1.5" fill="#9CA3AF" stroke="none"/></svg></button></div>`;
        container.appendChild(card);
      });
    }

    function render() {
      if (currentView === 'home') renderHome();
      else if (currentView === 'feed') renderFeed();
      else if (currentView === 'saved') renderSaved();
    }

    function openArticle(idx) {
      const a = articles[idx];
      if (!a || !a.url) return;
      const win = window.open(a.url, '_blank', 'noopener,noreferrer');
      if (!win) {
        // Popup blocked — fall back to a temporary anchor click
        const tmp = document.createElement('a');
        tmp.href = a.url;
        tmp.target = '_blank';
        tmp.rel = 'noopener noreferrer';
        document.body.appendChild(tmp);
        tmp.click();
        tmp.remove();
      }
    }

    function archiveArticle(idx) {
      saveState();
      articles[idx].archived = true;
      showToast('Archived. Ctrl+Z to undo');
      render();
    }

    function toggleLike(idx) {
      saveState();
      articles[idx].liked = !articles[idx].liked;
      showToast(articles[idx].liked ? 'Saved' : 'Removed');
      render();
    }

    function openTagModal(idx) {
      currentEditingIndex = idx;
      const article = articles[idx];
      const currentTagsDiv = document.getElementById('currentTags');
      const suggestionsDiv = document.getElementById('tagSuggestions');
      currentTagsDiv.innerHTML = article.tags.map(tag => `<div class="tag-chip"><span>${tag}</span><span class="tag-chip-remove" onclick="removeTag('${tag}')">×</span></div>`).join('');
      const allTags = new Set();
      articles.forEach(a => a.tags.forEach(t => allTags.add(t)));
      const suggestions = Array.from(allTags).filter(t => !article.tags.includes(t)).slice(0, 8);
      suggestionsDiv.innerHTML = suggestions.map(tag => `<button class="tag-suggestion" onclick="addTag('${tag}')">${tag}</button>`).join('');
      document.getElementById('tagModal').classList.add('open');
    }

    function removeTag(tag) {
      const article = articles[currentEditingIndex];
      article.tags = article.tags.filter(t => t !== tag);
      openTagModal(currentEditingIndex);
    }

    function addTag(tag) {
      const article = articles[currentEditingIndex];
      if (!article.tags.includes(tag)) {
        article.tags.push(tag);
      }
      openTagModal(currentEditingIndex);
    }

    function showOptionsMenu(event, idx) {
      event.stopPropagation();
      const menu = document.createElement('div');
      menu.className = 'options-menu';
      menu.style.position = 'fixed';
      menu.style.top = event.clientY + 'px';
      menu.style.left = Math.min(event.clientX, window.innerWidth - 200) + 'px';
      menu.innerHTML = `<button class="menu-item" onclick="openArticle(${idx})">Open Link</button><button class="menu-item" onclick="toggleLike(${idx})">Save</button><button class="menu-item" onclick="openTagModal(${idx})">Edit Tags</button><button class="menu-item" onclick="shareArticle(${idx})">Share</button><button class="menu-item" onclick="deleteArticle(${idx})">Delete</button>`;
      document.body.appendChild(menu);
      setTimeout(() => menu.remove(), 3000);
    }

    function shareArticle(idx) {
      const article = articles[idx];
      const text = article.title + ' - ' + article.url;
      navigator.clipboard.writeText(text);
      showToast('Copied to clipboard');
    }

    function deleteArticle(idx) {
      saveState();
      articles.splice(idx, 1);
      showToast('Deleted');
      render();
    }

    function feedCardPointerDown(e) {
      if (e.target.closest('button')) return;
      pointerStartX = e.clientX;
      pointerStartY = e.clientY;
      isDragging = true;
    }

    function feedCardPointerMove(e) {
      if (!isDragging) return;
      const deltaX = e.clientX - pointerStartX;
      const activeCard = document.querySelector('.feed-card.active');
      if (activeCard) {
        activeCard.style.transform = 'translateX(' + (deltaX * 0.5) + 'px) rotateZ(' + (deltaX * 0.05) + 'deg)';
        let overlay = activeCard.querySelector('.feed-overlay');
        if (!overlay) {
          overlay = document.createElement('div');
          overlay.className = 'feed-overlay';
          activeCard.appendChild(overlay);
        }
        if (deltaX < -50) {
          overlay.className = 'feed-overlay left show';
          overlay.textContent = 'ARCHIVE';
        } else if (deltaX > 50) {
          overlay.className = 'feed-overlay right show';
          overlay.textContent = 'ACTIONS';
        } else {
          overlay.className = 'feed-overlay';
        }
      }
    }

    function feedCardPointerUp(e) {
      if (!isDragging) return;
      isDragging = false;
      const deltaX = e.clientX - pointerStartX;
      const activeCard = document.querySelector('.feed-card.active');
      if (activeCard) {
        activeCard.style.transform = '';
        if (deltaX < -100) {
          const idx = feedIndices[feedCurrentIndex];
          archiveArticle(idx);
          feedCurrentIndex++;
          renderFeedCards();
        } else if (deltaX > 100) {
          showToast('Action menu');
        }
      }
    }

    document.getElementById('closeTagModal').addEventListener('click', () => {
      document.getElementById('tagModal').classList.remove('open');
    });

    document.getElementById('saveTagBtn').addEventListener('click', () => {
      saveState();
      document.getElementById('tagModal').classList.remove('open');
      render();
    });

    document.getElementById('cancelTagBtn').addEventListener('click', () => {
      document.getElementById('tagModal').classList.remove('open');
    });

    document.getElementById('searchBtn').addEventListener('click', () => {
      const query = prompt('Search:');
      if (query !== null) {
        searchQuery = query;
        currentView = 'home';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('[data-view="home"]').classList.add('active');
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('homeView').classList.add('active');
        render();
      }
    });

    document.getElementById('addBtn').addEventListener('click', () => {
      document.getElementById('addModal').classList.add('open');
    });

    document.getElementById('closeAddModal').addEventListener('click', () => {
      document.getElementById('addModal').classList.remove('open');
    });

    document.getElementById('submitAddBtn').addEventListener('click', () => {
      const url = document.getElementById('urlInput').value;
      const title = document.getElementById('titleInput').value;
      const category = document.getElementById('categoryInput').value;
      const summary = document.getElementById('summaryInput').value;
      if (url && title) {
        saveState();
        articles.unshift({title, url, platform: 'Manual', author: 'You', dateSent: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }), datePosted: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }), contentType: 'Article', category: category || 'General', tags: [], summary: summary || 'No summary provided'});
        document.getElementById('urlInput').value = '';
        document.getElementById('titleInput').value = '';
        document.getElementById('categoryInput').value = '';
        document.getElementById('summaryInput').value = '';
        document.getElementById('addModal').classList.remove('open');
        showToast('Article added');
        render();
      }
    });

    document.getElementById('cancelAddBtn').addEventListener('click', () => {
      document.getElementById('addModal').classList.remove('open');
    });

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const view = e.currentTarget.dataset.view;
        if (!view) return;
        currentView = view;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(view + 'View').classList.add('active');
        render();
      });
    });

    document.querySelectorAll('.sort-btn').forEach(btn => {
      if (btn.dataset.sort) {
        btn.addEventListener('click', () => setSort(btn.dataset.sort));
      }
    });

    document.getElementById('closeTagFilterModal').addEventListener('click', () => {
      document.getElementById('tagFilterModal').classList.remove('open');
    });
    document.getElementById('clearTagFilters').addEventListener('click', clearTagFilters);
    document.getElementById('applyTagFilters').addEventListener('click', applyTagFilters);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.getElementById('tagModal').classList.remove('open');
        document.getElementById('addModal').classList.remove('open');
        document.getElementById('tagFilterModal').classList.remove('open');
        document.getElementById('typeFilterModal').classList.remove('open');
        document.getElementById('categoryFilterModal').classList.remove('open');
      }
      if (e.ctrlKey && e.key === 'z') {
        e.preventDefault();
        undo();
      }
      if (e.ctrlKey && e.shiftKey && e.key === 'Z') {
        e.preventDefault();
        redo();
      }
    });

    render();
  </script>
</body>
</html>
