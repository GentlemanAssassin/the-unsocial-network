<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Unsocial Net.work</title>
  <link rel="icon" type="image/x-icon" href="Favicon.ico">
  <link rel="shortcut icon" type="image/x-icon" href="Favicon.ico">
  <link rel="apple-touch-icon" href="icon.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Newsreader:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      background: #0A0C10;
      color: #E5E7EB;
      font-family: 'DM Sans', sans-serif;
    }

    #app {
      width: 100%;
      max-width: 480px;
      height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: #0A0C10;
      overflow: hidden;
      position: relative;
    }

    header {
      padding: 16px 16px;
      background: rgba(10, 12, 16, 0.7);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(91, 156, 246, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-logo {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }

    .header-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .header-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: rgba(91, 156, 246, 0.1);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.2s ease;
      color: #FFFFFF;
    }

    .header-btn i {
      font-size: 20px;
      color: #FFFFFF;
      line-height: 1;
    }

    .header-btn:active {
      background: rgba(91, 156, 246, 0.2);
      transform: scale(0.95);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      -webkit-overflow-scrolling: touch;
    }

    .view {
      display: none;
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .view.active {
      display: flex;
      flex-direction: column;
    }

    #homeView {
      flex-direction: column;
    }

    .sort-controls {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid rgba(91, 156, 246, 0.1);
      flex-shrink: 0;
    }

    .sort-btn {
      padding: 6px 12px;
      background: rgba(91, 156, 246, 0.1);
      border: 1px solid rgba(91, 156, 246, 0.2);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: #E5E7EB;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .sort-btn.active {
      background: #5B9CF6;
      border-color: #5B9CF6;
      color: #0A0C10;
    }

    .sort-btn:active {
      transform: scale(0.95);
    }

    .cards-container {
      flex: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .card {
      background: #14161E;
      border-radius: 12px;
      padding: 12px;
      border: 1px solid rgba(91, 156, 246, 0.1);
      animation: cardEnter 0.4s ease-out;
      position: relative;
    }

    .new-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      background: linear-gradient(135deg, #5B9CF6, #22D3EE);
      color: #0A0C10;
      font-size: 10px;
      font-weight: 700;
      border-radius: 10px;
      letter-spacing: 0.5px;
      margin-right: 6px;
    }

    .card-edit-btn {
      width: 32px;
      height: 32px;
      padding: 0;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      color: #FFFFFF;
      transition: all 0.2s ease;
    }

    .card-edit-btn i {
      font-size: 18px;
      color: #FFFFFF;
      line-height: 1;
    }

    .card-edit-btn:active {
      background: rgba(91, 156, 246, 0.15);
      transform: scale(0.9);
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 10px;
      border-top: 1px solid rgba(91, 156, 246, 0.08);
    }

    .card-datetime {
      font-size: 11px;
      color: #6B7280;
      line-height: 1.3;
    }

    .card-datetime .card-time {
      color: #9CA3AF;
    }

    .card-footer-actions {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    /* List view styles */
    .cards-container.list-view .card {
      padding: 10px 12px;
    }

    .cards-container.list-view .card-summary {
      display: none;
    }

    .cards-container.list-view .card-title {
      font-size: 15px;
      margin-bottom: 6px;
    }

    .cards-container.list-view .card-author {
      font-size: 12px;
      margin-bottom: 6px;
    }

    .cards-container.list-view .card-tags {
      margin-bottom: 6px;
    }

    .saved-container.list-view .card {
      padding: 10px 12px;
    }

    .saved-container.list-view .card-summary {
      display: none;
    }

    .saved-container.list-view .card-title {
      font-size: 15px;
      margin-bottom: 6px;
    }

    .saved-container.list-view .card-author {
      font-size: 12px;
      margin-bottom: 6px;
    }

    .saved-container.list-view .card-tags {
      margin-bottom: 6px;
    }

    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
      font-size: 11px;
      color: #9CA3AF;
    }

    .card-meta {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .card-type {
      background: rgba(91, 156, 246, 0.15);
      padding: 2px 8px;
      border-radius: 4px;
      color: #5B9CF6;
      font-weight: 500;
    }

    .card-platform {
      color: #D1D5DB;
    }

    .card-date {
      color: #6B7280;
    }

    .card-title {
      font-family: 'Newsreader', serif;
      font-size: 18px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 8px;
      color: #F3F4F6;
    }

    .card-author {
      font-size: 13px;
      color: #9CA3AF;
      margin-bottom: 8px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      background: rgba(91, 156, 246, 0.15);
      color: #5B9CF6;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tag:active {
      transform: scale(0.95);
    }

    .card-summary {
      font-size: 13px;
      line-height: 1.5;
      color: #D1D5DB;
      margin-bottom: 12px;
    }

    .card-actions {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-top: 10px;
      border-top: 1px solid rgba(91, 156, 246, 0.08);
    }

    .action-btn {
      width: 40px;
      height: 40px;
      padding: 0;
      background: none;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      color: #FFFFFF;
    }

    .action-btn i {
      font-size: 20px;
      color: #FFFFFF;
      line-height: 1;
    }

    .action-btn:active {
      background: rgba(91, 156, 246, 0.15);
      transform: scale(0.9);
    }

    .action-btn.liked i {
      color: #F47067;
    }

    #feedView {
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .feed-stack {
      position: relative;
      width: 100%;
      max-width: 380px;
      height: 600px;
      perspective: 1000px;
    }

    .feed-card {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #14161E;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(91, 156, 246, 0.1);
      touch-action: pan-y;
      cursor: grab;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .feed-card.active {
      z-index: 3;
      transform: translateY(0) scale(1) rotateZ(0deg);
    }

    .feed-card.next {
      z-index: 2;
      transform: translateY(20px) scale(0.95) rotateZ(-2deg);
      opacity: 0.6;
    }

    .feed-card.next-next {
      z-index: 1;
      transform: translateY(40px) scale(0.9) rotateZ(-4deg);
      opacity: 0.4;
    }

    .feed-card-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 12px;
      color: #9CA3AF;
    }

    .feed-card-type {
      background: rgba(91, 156, 246, 0.15);
      padding: 4px 10px;
      border-radius: 4px;
      color: #5B9CF6;
      font-weight: 500;
    }

    .feed-card-date {
      color: #6B7280;
    }

    .feed-card-title {
      font-family: 'Newsreader', serif;
      font-size: 28px;
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 16px;
      color: #F3F4F6;
    }

    .feed-card-author {
      font-size: 14px;
      color: #9CA3AF;
      margin-bottom: 12px;
    }

    .feed-card-posted {
      font-size: 12px;
      color: #6B7280;
      margin-bottom: 16px;
    }

    .feed-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .feed-card-summary {
      font-size: 14px;
      line-height: 1.6;
      color: #D1D5DB;
      flex: 1;
      margin-bottom: 16px;
    }

    .feed-card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .feed-action-btn {
      flex: 1;
      min-width: 60px;
      padding: 10px 12px;
      background: rgba(91, 156, 246, 0.1);
      border: 1px solid rgba(91, 156, 246, 0.2);
      border-radius: 6px;
      color: #5B9CF6;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .feed-action-btn:active {
      background: rgba(91, 156, 246, 0.2);
    }

    .feed-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      border-radius: 16px;
    }

    .feed-overlay.left {
      background: rgba(244, 63, 94, 0.2);
      color: #F83E5E;
    }

    .feed-overlay.right {
      background: rgba(91, 156, 246, 0.2);
      color: #5B9CF6;
    }

    .feed-overlay.show {
      opacity: 1;
    }

    #savedView {
      flex-direction: column;
    }

    .saved-container {
      flex: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: #6B7280;
      text-align: center;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    nav {
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      background: rgba(10, 12, 16, 0.7);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(91, 156, 246, 0.1);
      flex-shrink: 0;
      z-index: 100;
    }

    .nav-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: none;
      color: #6B7280;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .nav-btn.active {
      color: #5B9CF6;
    }

    .nav-icon {
      font-size: 20px;
    }

    .nav-btn i {
      font-size: 24px;
      color: #FFFFFF;
      line-height: 1;
      transition: opacity 0.2s ease;
    }

    .nav-btn:disabled i {
      opacity: 0.25;
    }

    .nav-btn.active i {
      color: #5B9CF6;
    }

    .nav-icon-img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      opacity: 0.7;
      transition: opacity 0.2s ease;
    }

    .nav-btn:disabled .nav-icon-img {
      opacity: 0.2;
    }

    .nav-btn:not(:disabled):active .nav-icon-img {
      opacity: 1;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 200;
      animation: fadeIn 0.2s ease;
    }

    .modal.open {
      display: flex;
      align-items: flex-end;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: #14161E;
      width: 100%;
      max-width: 480px;
      border-radius: 16px 16px 0 0;
      padding: 20px;
      animation: slideUp 0.3s ease;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #F3F4F6;
    }

    .modal-section {
      margin-bottom: 16px;
    }

    .modal-label {
      font-size: 12px;
      color: #9CA3AF;
      font-weight: 600;
      margin-bottom: 8px;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tag-input {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .tag-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(91, 156, 246, 0.15);
      border: 1px solid rgba(91, 156, 246, 0.2);
      border-radius: 12px;
      font-size: 12px;
      color: #5B9CF6;
    }

    .tag-chip-remove {
      cursor: pointer;
      font-weight: 700;
      opacity: 0.6;
      transition: opacity 0.2s ease;
    }

    .tag-chip-remove:active {
      opacity: 1;
    }

    .tag-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag-suggestion {
      padding: 6px 12px;
      background: rgba(91, 156, 246, 0.1);
      border: 1px solid rgba(91, 156, 246, 0.15);
      border-radius: 6px;
      font-size: 12px;
      color: #9CA3AF;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tag-suggestion:active {
      background: rgba(91, 156, 246, 0.2);
      color: #5B9CF6;
    }

    .modal-buttons {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
    }

    .modal-btn.primary {
      background: #5B9CF6;
      color: #0A0C10;
    }

    .modal-btn.primary:active {
      background: #4A8FE8;
    }

    .modal-btn.secondary {
      background: rgba(91, 156, 246, 0.1);
      color: #5B9CF6;
      border: 1px solid rgba(91, 156, 246, 0.2);
    }

    .modal-btn.secondary:active {
      background: rgba(91, 156, 246, 0.15);
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border: none;
      background: rgba(91, 156, 246, 0.1);
      border-radius: 8px;
      color: #5B9CF6;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .modal-close:active {
      background: rgba(91, 156, 246, 0.2);
    }

    .options-menu {
      position: fixed;
      background: #14161E;
      border: 1px solid rgba(91, 156, 246, 0.2);
      border-radius: 8px;
      min-width: 180px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      z-index: 300;
      animation: fadeIn 0.2s ease;
    }

    .menu-item {
      padding: 12px 16px;
      border: none;
      background: none;
      color: #E5E7EB;
      width: 100%;
      text-align: left;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
      border-bottom: 1px solid rgba(91, 156, 246, 0.05);
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    .menu-item:active {
      background: rgba(91, 156, 246, 0.1);
      color: #5B9CF6;
    }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #1F2937;
      color: #F3F4F6;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid rgba(91, 156, 246, 0.2);
      font-size: 14px;
      z-index: 250;
      animation: slideUp 0.3s ease;
      max-width: 90%;
      text-align: center;
    }

    input[type="text"],
    textarea {
      background: rgba(91, 156, 246, 0.05);
      border: 1px solid rgba(91, 156, 246, 0.2);
      border-radius: 8px;
      padding: 10px 12px;
      color: #E5E7EB;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      width: 100%;
      transition: all 0.2s ease;
    }

    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      background: rgba(91, 156, 246, 0.1);
      border-color: rgba(91, 156, 246, 0.4);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .undo-redo-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 6px 16px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(91, 156, 246, 0.06);
      position: sticky;
      top: 0;
      z-index: 10;
      background: #0F1724;
    }

    .undo-redo-btn {
      padding: 6px 14px;
      background: rgba(91, 156, 246, 0.08);
      border: 1px solid rgba(91, 156, 246, 0.15);
      border-radius: 6px;
      color: #5B9CF6;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .undo-redo-btn:disabled {
      opacity: 0.25;
      cursor: default;
    }

    .undo-redo-btn:not(:disabled):active {
      background: rgba(91, 156, 246, 0.2);
      transform: scale(0.95);
    }

    .tag-filter-btn {
      padding: 6px 14px;
      background: rgba(91, 156, 246, 0.08);
      border: 1px solid rgba(91, 156, 246, 0.15);
      border-radius: 6px;
      color: #9CA3AF;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-left: auto;
    }

    .tag-filter-btn.active-filter {
      background: rgba(91, 156, 246, 0.2);
      border-color: #5B9CF6;
      color: #5B9CF6;
    }

    .tag-filter-btn:active {
      transform: scale(0.95);
    }

    .tag-filter-modal-content {
      max-height: 70vh;
      overflow-y: auto;
    }

    .tag-filter-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag-filter-chip {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid rgba(91, 156, 246, 0.15);
      background: rgba(91, 156, 246, 0.05);
      color: #9CA3AF;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tag-filter-chip.selected {
      background: rgba(91, 156, 246, 0.2);
      border-color: #5B9CF6;
      color: #5B9CF6;
    }

    .tag-filter-chip:active {
      transform: scale(0.95);
    }

    .active-filters {
      display: none;
      gap: 6px;
      flex-wrap: wrap;

    let archiveFilter = 'all'; // 'all' or 'favorites'
    const NOW = new Date();
    const DAY_MS = 24 * 60 * 60 * 1000;

    function parseDate(dateStr) {
      if (!dateStr) return new Date(0);
      const months = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 };
      const parts = dateStr.replace(',', '').split(' ');
      if (parts.length === 3) {
        const month = months[parts[0]];
        const day = parseInt(parts[1]);
        const year = parseInt(parts[2]);
        return new Date(year, month, day);
      }
      return new Date(0);
    }

    function isNew(article) {
      // Prefer an explicit addedAt timestamp; otherwise fall back to dateSent
      let ts;
      if (article.addedAt) ts = new Date(article.addedAt);
      else ts = parseDate(article.dateSent);
      if (!ts || isNaN(ts.getTime())) return false;
      return (NOW - ts) < DAY_MS;
    }

    function formatDateTime(article) {
      let ts;
      if (article.addedAt) ts = new Date(article.addedAt);
      else ts = parseDate(article.dateSent);
      if (!ts || isNaN(ts.getTime()) || ts.getTime() === 0) {
        return '<span class="card-date-part">' + (article.dateSent || '') + '</span>';
      }
      const dateStr = ts.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      // If we have a time component (only true for addedAt), show it
      if (article.addedAt) {
        const timeStr = ts.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        return '<span class="card-date-part">' + dateStr + '</span> <span class="card-time">' + timeStr + '</span>';
      }
      return '<span class="card-date-part">' + dateStr + '</span>';
    }

    function cardInnerHtml(idx, article, catColor) {
      const newBadge = isNew(article) ? '<span class="new-badge">NEW</span>' : '';
      const dateTime = formatDateTime(article);
      return `<div class="card-header">
        <div class="card-meta">${newBadge}<div class="card-type">${article.contentType}</div><div class="card-platform">${article.platform}</div></div>
        <button class="card-edit-btn" onclick="openEditPost(${idx})" title="Edit"><i class="ph ph-pencil"></i></button>
      </div>
      <div class="card-title" onclick="openArticle(${idx})" style="cursor:pointer;">${article.title}</div>
      <div class="card-author">by ${article.author}</div>
      <div class="card-tags">${article.tags.map(tag => `<span class="tag" style="background-color: ${catColor}22; color: ${catColor};">${tag}</span>`).join('')}</div>
      <div class="card-summary">${article.summary}</div>
      <div class="card-footer">
        <div class="card-datetime">${dateTime}</div>
        <div class="card-footer-actions">
          <button class="action-btn ${article.liked ? 'liked' : ''}" onclick="toggleLike(${idx})" title="${article.liked ? 'Unfavorite' : 'Favorite'}"><i class="ph ${article.liked ? 'ph-fill' : ''} ph-star"></i></button>
          <button class="action-btn" onclick="archiveArticle(${idx})" title="Archive"><i class="ph ph-archive"></i></button>
          <button class="action-btn" onclick="showOptionsMenu(event, ${idx})" title="Menu"><i class="ph ph-dots-three-circle"></i></button>
        </div>
      </div>`;
    }

    function getSortedIndices(sort = 'newest') {
      const visible = articles.map((a, i) => i).filter(i => isVisible(i));
      const sorted = [...visible];
      if (sort === 'newest') {
        sorted.sort((a, b) => parseDate(articles[b].datePosted) - parseDate(articles[a].datePosted));
      } else if (sort === 'oldest') {
        sorted.sort((a, b) => parseDate(articles[a].datePosted) - parseDate(articles[b].datePosted));
      } else if (sort === 'saved') {
        sorted.sort((a, b) => parseDate(articles[b].dateSent) - parseDate(articles[a].dateSent));
      } else if (sort === 'category') {
        sorted.sort((a, b) => (articles[a].category || '').localeCompare(articles[b].category || ''));
      } else if (sort === 'shuffle') {
        for (let i = sorted.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [sorted[i], sorted[j]] = [sorted[j], sorted[i]];
        }
      }
      return sorted;
    }

    function isVisible(index) {
      const article = articles[index];
      if (article.archived) return false;
      if (article.liked) return false; // favorites also get pulled from the main feed
      if (searchQuery && !article.title.toLowerCase().includes(searchQuery.toLowerCase()) && !article.summary.toLowerCase().includes(searchQuery.toLowerCase())) return false;
      if (activeTypeFilters.size > 0 && !activeTypeFilters.has(article.contentType)) return false;
      if (activeCategoryFilters.size > 0 && !activeCategoryFilters.has(article.category)) return false;
      if (activeTagFilters.size > 0 && !article.tags.some(t => activeTagFilters.has(t))) return false;
      return true;
    }

    function setSort(sortType) {

      if (matchBtn) matchBtn.classList.add('active');
      renderHome();
    }

    function cycleSort() {
      const btn = document.getElementById('cycleSortBtn');
      if (currentSort === 'newest') {
        currentSort = 'oldest';
        btn.textContent = 'Oldest';
      } else if (currentSort === 'oldest') {
        currentSort = 'shuffle';
        btn.textContent = 'Random';
      } else {
        currentSort = 'newest';
        btn.textContent = 'Newest';
      }
      renderHome();
    }

    function saveState() {

      redoStack = [];

        articles = JSON.parse(undoStack.pop());

    function openTypeFilterModal() {
      const typeCounts = {};

        const catColor = CAT_COLORS[article.category] || '#5B9CF6';
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = cardInnerHtml(idx, article, catColor);
        container.appendChild(card);
      });
      if (indices.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>No items match your filters</p></div>';
      }
    }

    function renderFeed() {
      const feedStack = document.getElementById('feedStack');
      feedStack.innerHTML = '';
      feedIndices = getSortedIndices('shuffle');
      feedCurrentIndex = 0;
      renderFeedCards();
    }

    function renderFeedCards() {
      const feedStack = document.getElementById('feedStack');
      feedStack.innerHTML = '';
      for (let i = 0; i < 3 && feedCurrentIndex + i < feedIndices.length; i++) {
        const idx = feedIndices[feedCurrentIndex + i];
        const article = articles[idx];
        const catColor = CAT_COLORS[article.category] || '#5B9CF6';
        const card = document.createElement('div');
        card.className = 'feed-card';
        if (i === 0) card.classList.add('active');
        else if (i === 1) card.classList.add('next');
        else if (i === 2) card.classList.add('next-next');
        card.innerHTML = `<div class="feed-card-header"><div class="feed-card-type">${article.contentType}</div><div class="feed-card-date">${article.dateSent}</div></div><div class="feed-card-title">${article.title}</div><div class="feed-card-author">by ${article.author}</div><div class="feed-card-posted">${article.datePosted}</div><div class="feed-card-tags">${article.tags.map(tag => `<span class="tag" style="background-color: ${catColor}22; color: ${catColor};">${tag}</span>`).join('')}</div><div class="feed-card-summary">${article.summary}</div><div class="feed-card-actions"><button class="action-btn" onclick="openArticle(${idx})"><img src="Icons/ShuffleIn.png" alt="Open" title="Open"></button><button class="action-btn" onclick="archiveArticle(${idx})"><img src="Icons/Archive.png" alt="Archive" title="Archive"></button><button class="action-btn" onclick="toggleLike(${idx})"><img src="Icons/Like.png" alt="${article.liked ? 'Unlike' : 'Like'}" title="${article.liked ? 'Unlike' : 'Like'}" style="${article.liked ? 'filter: drop-shadow(0 0 4px #F472B6); opacity:1;' : ''}"></button></div>`;
        card.addEventListener('pointerdown', feedCardPointerDown);
        card.addEventListener('pointermove', feedCardPointerMove);
        card.addEventListener('pointerup', feedCardPointerUp);
        feedStack.appendChild(card);
      }
    }

    function renderSaved() {
      const container = document.getElementById('savedContainer');
      container.innerHTML = '';
      container.className = 'saved-container' + (listViewMode ? ' list-view' : '');
      // Archive view shows items that have been removed from the main feed (archived or liked).
      // Favorites filter narrows to just liked items.
      let items;
      if (archiveFilter === 'favorites') {
        items = articles.map((a, i) => i).filter(i => articles[i].liked);
      } else {
        items = articles.map((a, i) => i).filter(i => articles[i].archived || articles[i].liked);
      }
      // Sort newest first
      items.sort((a, b) => parseDate(articles[b].dateSent) - parseDate(articles[a].dateSent));
      if (items.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">' + (archiveFilter === 'favorites' ? '⭐' : '📦') + '</div><p>' + (archiveFilter === 'favorites' ? 'No favorites yet' : 'Archive is empty') + '</p></div>';
        return;
      }
      items.forEach((idx) => {
        const article = articles[idx];
        const catColor = CAT_COLORS[article.category] || '#5B9CF6';
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = cardInnerHtml(idx, article, catColor);
        container.appendChild(card);
      });
    }

    function setArchiveFilter(filter) {
      archiveFilter = filter;
      document.getElementById('archiveAllBtn').classList.toggle('active', filter === 'all');
      document.getElementById('archiveFavBtn').classList.toggle('active', filter === 'favorites');
      renderSaved();
    }

    function toggleListView() {
      // If we're not on home, switch to home first
      if (currentView !== 'home') {
        currentView = 'home';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('homeView').classList.add('active');
        render();
        updateViewModeIcon();
        return;
      }
      listViewMode = !listViewMode;
      updateViewModeIcon();
      render();
    }

    function updateViewModeIcon() {
      const icon = document.getElementById('viewModeIcon');
      if (!icon) return;
      icon.className = listViewMode ? 'ph-fill ph-rows' : 'ph-fill ph-cards';
      const btn = document.getElementById('viewModeBtn');
      if (btn) btn.classList.toggle('active', currentView === 'home');
    }

    function render() {
      if (currentView === 'home') renderHome();
      else if (currentView === 'feed') renderFeed();
      else if (currentView === 'saved') renderSaved();
    }

    function openArticle(idx) {
      const a = articles[idx];
      if (!a || !a.url) return;
      const win = window.open(a.url, '_blank', 'noopener,noreferrer');
      if (!win) {
        // Popup blocked — fall back to a temporary anchor click
        const tmp = document.createElement('a');
        tmp.href = a.url;
        tmp.target = '_blank';
        tmp.rel = 'noopener noreferrer';
        document.body.appendChild(tmp);
        tmp.click();
        tmp.remove();
      }
    }

    function archiveArticle(idx) {
      saveState();
      articles[idx].archived = true;
      showToast('Archived. Ctrl+Z to undo');
      render();
    }

    function toggleLike(idx) {
      saveState();
      articles[idx].liked = !articles[idx].liked;
      showToast(articles[idx].liked ? 'Saved' : 'Removed');
      render();
    }

    function openTagModal(idx) {
      currentEditingIndex = idx;
      const article = articles[idx];
      const currentTagsDiv = document.getElementById('currentTags');
      const suggestionsDiv = document.getElementById('tagSuggestions');
      currentTagsDiv.innerHTML = article.tags.map(tag => `<div class="tag-chip"><span>${tag}</span><span class="tag-chip-remove" onclick="removeTag('${tag}')">×</span></div>`).join('');
      const allTags = new Set();
      articles.forEach(a => a.tags.forEach(t => allTags.add(t)));
      const suggestions = Array.from(allTags).filter(t => !article.tags.includes(t)).slice(0, 8);
      suggestionsDiv.innerHTML = suggestions.map(tag => `<button class="tag-suggestion" onclick="addTag('${tag}')">${tag}</button>`).join('');
      document.getElementById('tagModal').classList.add('open');
    }

    function removeTag(tag) {
      const article = articles[currentEditingIndex];
      article.tags = article.tags.filter(t => t !== tag);
      openTagModal(currentEditingIndex);
    }

    function addTag(tag) {
      const article = articles[currentEditingIndex];
      if (!article.tags.includes(tag)) {
        article.tags.push(tag);
      }
      openTagModal(currentEditingIndex);
    }

    function showOptionsMenu(event, idx) {
      event.stopPropagation();
      // Close any existing menu
      document.querySelectorAll('.options-menu').forEach(m => m.remove());
      const menu = document.createElement('div');
      menu.className = 'options-menu';
      menu.style.position = 'fixed';
      menu.style.top = event.clientY + 'px';
      menu.style.left = Math.min(event.clientX, window.innerWidth - 200) + 'px';
      menu.innerHTML = `<button class="menu-item" onclick="shareArticle(${idx}); this.parentElement.remove();">Share</button><button class="menu-item" onclick="deleteArticle(${idx}); this.parentElement.remove();">Delete</button>`;
      document.body.appendChild(menu);
      const closeOnOutside = (e) => {
        if (!menu.contains(e.target)) {
          menu.remove();
          document.removeEventListener('click', closeOnOutside);
        }
      };
      setTimeout(() => document.addEventListener('click', closeOnOutside), 0);
    }

    function shareArticle(idx) {
      const article = articles[idx];
      const text = article.title + ' - ' + article.url;
      navigator.clipboard.writeText(text);
      showToast('Copied to clipboard');
    }

    function openEditPost(idx) {
      currentEditingIndex = idx;
      const article = articles[idx];
      document.getElementById('editContentType').value = article.contentType || 'Article';
      document.getElementById('editCategory').value = article.category || 'Markets & Research';
      renderEditTags();
      document.getElementById('editNewTag').value = '';
      document.getElementById('editPostModal').classList.add('open');
    }

    function renderEditTags() {
      const article = articles[currentEditingIndex];
      const currentTagsDiv = document.getElementById('editCurrentTags');
      const suggestionsDiv = document.getElementById('editTagSuggestions');
      currentTagsDiv.innerHTML = (article.tags || []).map(tag => `<div class="tag-chip"><span>${tag}</span><span class="tag-chip-remove" onclick="removeEditTag('${tag.replace(/'/g, "\\'")}')">×</span></div>`).join('');
      const allTags = new Set();
      articles.forEach(a => (a.tags || []).forEach(t => allTags.add(t)));
      const suggestions = Array.from(allTags).filter(t => !(article.tags || []).includes(t)).slice(0, 8);
      suggestionsDiv.innerHTML = suggestions.map(tag => `<button class="tag-suggestion" onclick="addEditTag('${tag.replace(/'/g, "\\'")}')">${tag}</button>`).join('');
    }

    function removeEditTag(tag) {
      const article = articles[currentEditingIndex];
      article.tags = (article.tags || []).filter(t => t !== tag);
      renderEditTags();
    }

    function addEditTag(tag) {
      const article = articles[currentEditingIndex];
      if (!article.tags) article.tags = [];
      if (!article.tags.includes(tag)) article.tags.push(tag);
      renderEditTags();
    }

    function saveEditPost() {
      saveState();
      const article = articles[currentEditingIndex];
      article.contentType = document.getElementById('editContentType').value;
      article.category = document.getElementById('editCategory').value;
      const newTagInput = document.getElementById('editNewTag').value.trim();
      if (newTagInput) {
        newTagInput.split(',').map(t => t.trim()).filter(Boolean).forEach(t => {
          if (!article.tags) article.tags = [];
          if (!article.tags.includes(t)) article.tags.push(t);
        });
      }
      document.getElementById('editPostModal').classList.remove('open');
      showToast('Saved');
      render();
    }

    function deleteArticle(idx) {
      saveState();
      articles.splice(idx, 1);
      showToast('Deleted');
      render();
    }

    function feedCardPointerDown(e) {
      if (e.target.closest('button')) return;
      pointerStartX = e.clientX;
      pointerStartY = e.clientY;
      isDragging = true;
    }

    function feedCardPointerMove(e) {
      if (!isDragging) return;
      const deltaX = e.clientX - pointerStartX;
      const activeCard = document.querySelector('.feed-card.active');
      if (activeCard) {
        activeCard.style.transform = 'translateX(' + (deltaX * 0.5) + 'px) rotateZ(' + (deltaX * 0.05) + 'deg)';
        let overlay = activeCard.querySelector('.feed-overlay');
        if (!overlay) {
          overlay = document.createElement('div');
          overlay.className = 'feed-overlay';
          activeCard.appendChild(overlay);
        }
        if (deltaX < -50) {
          overlay.className = 'feed-overlay left show';
          overlay.textContent = 'ARCHIVE';
        } else if (deltaX > 50) {
          overlay.className = 'feed-overlay right show';
          overlay.textContent = 'ACTIONS';
        } else {
          overlay.className = 'feed-overlay';
        }
      }
    }

    function feedCardPointerUp(e) {
      if (!isDragging) return;
      isDragging = false;
      const deltaX = e.clientX - pointerStartX;
      const activeCard = document.querySelector('.feed-card.active');
      if (activeCard) {
        activeCard.style.transform = '';
        if (deltaX < -100) {
          const idx = feedIndices[feedCurrentIndex];
          archiveArticle(idx);
          feedCurrentIndex++;
          renderFeedCards();
        } else if (deltaX > 100) {
          showToast('Action menu');
        }
      }
    }

    document.getElementById('closeTagModal').addEventListener('click', () => {
      document.getElementById('tagModal').classList.remove('open');
    });

    document.getElementById('saveTagBtn').addEventListener('click', () => {
      saveState();
      document.getElementById('tagModal').classList.remove('open');
      render();
    });

    document.getElementById('cancelTagBtn').addEventListener('click', () => {
      document.getElementById('tagModal').classList.remove('open');
    });

    document.getElementById('searchBtn').addEventListener('click', () => {
      const query = prompt('Search:');
      if (query !== null) {
        searchQuery = query;
        currentView = 'home';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('homeView').classList.add('active');
        updateViewModeIcon();
        render();
      }
    });

    // Enter key adds a tag in the edit post modal
    document.getElementById('editNewTag').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const val = e.target.value.trim();
        if (val) {
          addEditTag(val);
          e.target.value = '';
        }
      }
    });

    document.getElementById('addBtn').addEventListener('click', () => {
      document.getElementById('addModal').classList.add('open');
    });

    document.getElementById('closeAddModal').addEventListener('click', () => {
      document.getElementById('addModal').classList.remove('open');
    });

    document.getElementById('submitAddBtn').addEventListener('click', () => {
      const url = document.getElementById('urlInput').value;
      const title = document.getElementById('titleInput').value;
      const contentType = document.getElementById('typeInput').value;
      const category = document.getElementById('categoryInput').value;
      const summary = document.getElementById('summaryInput').value;
      if (url && title) {
        saveState();
        const now = new Date();
        const dateStr = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        articles.unshift({
          title, url,
          platform: 'Manual',
          author: 'You',
          dateSent: dateStr,
          datePosted: dateStr,
          addedAt: now.toISOString(),
          contentType: contentType || 'Post',
          category: category || 'AI Tooling',
          tags: [],
          summary: summary || 'No summary provided'
        });
        document.getElementById('urlInput').value = '';
        document.getElementById('titleInput').value = '';
        document.getElementById('summaryInput').value = '';
        document.getElementById('addModal').classList.remove('open');
        showToast('Added');
        render();
      }
    });

    document.getElementById('cancelAddBtn').addEventListener('click', () => {
      document.getElementById('addModal').classList.remove('open');
    });

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const view = e.currentTarget.dataset.view;
        if (!view) return;
        currentView = view;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(view + 'View').classList.add('active');
        updateViewModeIcon();
        render();
      });
    });

    document.querySelectorAll('.sort-btn').forEach(btn => {
      if (btn.dataset.sort) {
        btn.addEventListener('click', () => setSort(btn.dataset.sort));
      }
    });

    document.getElementById('closeTagFilterModal').addEventListener('click', () => {
      document.getElementById('tagFilterModal').classList.remove('open');
    });
    document.getElementById('clearTagFilters').addEventListener('click', clearTagFilters);
    document.getElementById('applyTagFilters').addEventListener('click', applyTagFilters);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.getElementById('tagModal').classList.remove('open');
        document.getElementById('addModal').classList.remove('open');
        document.getElementById('tagFilterModal').classList.remove('open');
        document.getElementById('typeFilterModal').classList.remove('open');
        document.getElementById('categoryFilterModal').classList.remove('open');
      }
      if (e.ctrlKey && e.key === 'z') {
        e.preventDefault();
        undo();
      }
      if (e.ctrlKey && e.shiftKey && e.key === 'Z') {
        e.preventDefault();
        redo();
      }
    });

    updateViewModeIcon();
    render();
  </script>
</body>
</html>
